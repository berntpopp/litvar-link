services:
  litvar-link:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    
    container_name: litvar_link_server
    
    # Environment configuration
    env_file:
      - ../.env
    
    environment:
      # Development overrides
      LITVAR_LINK_LOG_LEVEL: DEBUG
      LITVAR_LINK_HOST: 0.0.0.0
      LITVAR_LINK_PORT: 8000
      LITVAR_LINK_RELOAD: "false"  # Disable reload in container
    
    # Port mapping
    ports:
      - "${LITVAR_LINK_PORT:-8000}:8000"
    
    # Use the default production command for simplicity
    # For development with code changes, rebuild the container
    command: ["uvicorn", "litvar_link.app:app", "--host", "0.0.0.0", "--port", "8000"]
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Resource limits for development
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    
    # Restart policy
    restart: unless-stopped
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"