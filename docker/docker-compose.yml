# Explicit project name isolates this stack. Without it, Compose defaults the project to the
# parent-dir basename ("docker"), shared by every -link repo that roots its compose at
# docker/docker-compose.yml — pooling unrelated containers/volumes into one "docker" project
# and triggering spurious orphan-container warnings (and making --remove-orphans able to delete
# a sibling stack). See https://docs.docker.com/reference/compose-file/version-and-name/
name: litvar-link

services:
  litvar-link:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    
    container_name: litvar_link_server
    
    # Environment configuration
    env_file:
      - path: ../.env
        required: false
    
    environment:
      # Development overrides
      LITVAR_LINK_LOG_LEVEL: DEBUG
      LITVAR_LINK_HOST: 0.0.0.0
      LITVAR_LINK_PORT: 8000
      LITVAR_LINK_RELOAD: "false"  # Disable reload in container
    
    # Port mapping
    ports:
      - "${LITVAR_LINK_PORT:-8000}:8000"
    
    # Run the UNIFIED server (REST API + MCP). The bare `uvicorn litvar_link.app:app`
    # serves only the REST API and leaves /mcp unmounted (404); `serve unified` mounts
    # the MCP streamable-HTTP facade with its session-manager lifespan.
    command: ["litvar-link", "serve", "unified", "--host", "0.0.0.0", "--port", "8000"]
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Resource limits for development
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    
    # Restart policy
    restart: unless-stopped
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"