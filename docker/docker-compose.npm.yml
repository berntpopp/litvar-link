# NPM Production deployment - extends base docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.npm.yml up -d

# Pin the compose project name so layering base+npm does not default to the
# parent dir ("docker") and collide with other services' default project.
name: litvar-link-npm

services:
  litvar-link:
    # Deploy pulls the released, attested image; it never builds from source.
    # `!reset` is required: the base compose file defines `build:`, and without this
    # the merged model would still be buildable.
    # Pin a digest, not a tag: there is no `latest`, and only a digest is immutable.
    build: !reset null
    image: ${LITVAR_LINK_IMAGE:?Set LITVAR_LINK_IMAGE to ghcr.io/berntpopp/litvar-link@sha256:<digest>}
    pull_policy: missing

    # Remove the base host-port mapping - NPM handles routing. `!reset` is
    # required: a plain `ports: []` MERGES with (does not replace) the base
    # list, leaving 8000:8000 published (collides with other host:8000 binds).
    ports: !reset []
    
    # Use Docker/NPM environment file
    env_file:
      - path: ../.env.docker
        required: false
    
    # Add NPM network connectivity
    networks:
      - litvar_internal_net
      - npm_proxy_network
    
    # Production environment overrides
    environment:
      LITVAR_LINK_LOG_FORMAT: json
      LITVAR_LINK_LOG_LEVEL: INFO
      LITVAR_LINK_HOST: 0.0.0.0
      LITVAR_LINK_RELOAD: "false"
      LITVAR_LINK_ALLOWED_HOSTS: '["localhost","127.0.0.1","::1","litvar-link.genefoundry.org"]'
      LITVAR_LINK_ALLOWED_ORIGINS: '["https://litvar-link.genefoundry.org"]'
      LITVAR_LINK_CORS_ORIGINS: '["https://litvar-link.genefoundry.org"]'

    # Run the unified CLI server so the MCP facade is mounted at /mcp. The image
    # default is the same guarded unified server; keep the command
    # explicit here so the NPM deployment contract remains visible in Compose.
    command: ["litvar-link", "serve", "unified", "--host", "0.0.0.0", "--port", "8000"]

    # Override the base lists rather than appending duplicates in the deployed
    # base+NPM Compose chain.
    read_only: true
    tmpfs: !override
      - /tmp:rw,noexec,nosuid,size=64m,mode=1777
    security_opt: !override
      - no-new-privileges:true
    cap_drop: !override
      - ALL
    init: true

    # Enhanced health check for NPM routing
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Host: localhost", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Production resource limits
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
      
      # Production restart policy. max_attempts is only valid with
      # condition: on-failure (Docker rejects it with condition: any).
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    
    # Production logging with rotation
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=litvar-link,environment=production,deployment=npm"

networks:
  litvar_internal_net:
    driver: bridge
  npm_proxy_network:
    external: true
    # Default matches the NPM container's network on the GeneFoundry VPS.
    name: ${NPM_SHARED_NETWORK_NAME:-npm_default}
