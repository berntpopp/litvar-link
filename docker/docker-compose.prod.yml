# Production docker-compose override
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  litvar-link:
    # Production-specific environment variables
    environment:
      LITVAR_LINK_LOG_LEVEL: INFO
      LITVAR_LINK_LOG_FORMAT: json
      LITVAR_LINK_RELOAD: "false"
      GUNICORN_WORKERS: 4
      GUNICORN_LOG_LEVEL: warning
    
    # Remove development volume mounts
    volumes: []
    
    # Use the default production command (Gunicorn)
    command: ["gunicorn", "-c", "gunicorn_conf.py", "litvar_link.app:app"]

    # Behind the reverse proxy the container is expose-only. `!reset` (not []) is
    # required: Compose MERGES list fields across -f overlays, so a plain
    # `ports: []` would NOT drop the base file's "${LITVAR_LINK_PORT:-8000}:8000"
    # mapping — it would stay published on the host's public IP.
    ports: !reset []

    # Hardened runtime (Container & Deployment Hardening Standard v1, rules 7-14).
    # LitVar-Link is a stateless live LitVar2 proxy with no persistent state, so
    # the only writable path is an ephemeral tmpfs scratch (gunicorn worker
    # heartbeats / TMPDIR); the root filesystem is read-only.
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    init: true

    # Production resource limits
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
          pids: 256
        reservations:
          memory: 512M
          cpus: '0.5'
      
      # Production restart policy
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
    
    # Enhanced health check for production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    
    # Production logging with rotation
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=litvar-link,environment=production"