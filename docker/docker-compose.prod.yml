# Production docker-compose override
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  litvar-link:
    build: !reset null
    image: ${LITVAR_LINK_IMAGE:?set a verified digest-addressed image}
    pull_policy: missing
    container_name: !reset null
    env_file: !reset []
    # Production-specific environment variables
    environment:
      LITVAR_LINK_LOG_LEVEL: INFO
      LITVAR_LINK_LOG_FORMAT: json
      LITVAR_LINK_RELOAD: "false"
      LITVAR_LINK_ALLOWED_HOSTS: '["localhost","127.0.0.1","::1","litvar-link.genefoundry.org"]'
      LITVAR_LINK_ALLOWED_ORIGINS: '["https://litvar-link.genefoundry.org"]'
      LITVAR_LINK_CORS_ORIGINS: '["https://litvar-link.genefoundry.org"]'
      GF_HEALTHCHECK_HOST: localhost
    
    # Remove development volume mounts
    volumes: !override []
    
    command: !reset null

    # Behind the reverse proxy the container is expose-only. `!reset` (not []) is
    # required: Compose MERGES list fields across -f overlays, so a plain
    # `ports: []` would NOT drop the base file's "${LITVAR_LINK_PORT:-8000}:8000"
    # mapping — it would stay published on the host's public IP.
    ports: !reset []
    expose:
      - "8000"

    # Hardened runtime (Container & Deployment Hardening Standard v1, rules 7-14).
    # LitVar-Link is a stateless live LitVar2 proxy with no persistent state, so
    # the only writable path is an ephemeral TMPDIR scratch; the root filesystem
    # is read-only.
    read_only: true
    tmpfs: !override
      - /tmp:rw,noexec,nosuid,size=64m,mode=1777
    security_opt: !override
      - no-new-privileges:true
    cap_drop: !override
      - ALL
    init: true

    # Production resource limits
    deploy: !override
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
          pids: 256
    restart: on-failure
    
    # Enhanced health check for production
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - 'curl -f -H "Host: $${GF_HEALTHCHECK_HOST}" http://localhost:8000/health'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Production logging with rotation
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=litvar-link,environment=production"
