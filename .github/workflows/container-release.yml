name: Container release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: container-release-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  attestations: write
  contents: write
  id-token: write
  packages: write

jobs:
  release:
    uses: berntpopp/genefoundry-router/.github/workflows/_container-release.yml@3a94e04441b9accabf533d8b46ce37eb08b0799a
